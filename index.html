<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="ProLink Zimbabwe connects vetted graduates with clients for tutoring, medical, legal and technical services.">
<title>ProLink Zimbabwe</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a8a">

<style>
body { padding-bottom: 70px; }

.gradient-bg {
background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #2563eb 100%);
}

.professional-card {
transition: 0.3s ease;
}
.professional-card:hover {
transform: translateY(-5px);
box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}

.modal-bg {
background: rgba(0,0,0,0.6);
}
</style>
</head>

<body class="bg-gray-50 font-sans">

<!-- NAV -->
<nav class="gradient-bg text-white shadow-lg p-4 text-center text-xl font-bold">
ProLink <span class="text-yellow-400">ZW</span>
</nav>

<!-- HERO -->
<section class="gradient-bg text-white p-6 text-center">
<h1 class="text-3xl font-bold mb-3">Find Trusted Professionals Nearby</h1>
<p class="opacity-90 mb-4">Verified. Negotiable. Reliable.</p>
<button onclick="getUserLocation()" class="bg-yellow-400 text-blue-900 px-5 py-2 rounded-full font-bold">
Enable Location
</button>
</section>

<!-- MAP -->
<section class="p-4">
<div id="map" class="w-full h-64 rounded-xl shadow"></div>
</section>

<!-- PROFESSIONAL LIST -->
<section class="p-4">
<h2 class="text-xl font-bold mb-4">Available Nearby</h2>

<div class="professional-card bg-white rounded-xl p-4 mb-4 shadow">
<div class="flex justify-between items-center">
<div>
<h3 class="font-bold">Tinashe M.</h3>
<p class="text-sm text-gray-500">Math Tutor</p>
<p id="distance1" class="text-sm text-blue-600"></p>
</div>
<span class="font-bold text-blue-700">$15/hr</span>
</div>

<button onclick="openBooking('Tinashe M.',15)"
class="w-full mt-3 bg-blue-600 text-white py-2 rounded-lg font-bold">
Hire Now
</button>
</div>

</section>

<!-- BOOKING MODAL -->
<div id="bookingModal" class="fixed inset-0 hidden modal-bg flex items-center justify-center">
<div class="bg-white p-6 rounded-xl w-80">
<h3 class="font-bold text-lg mb-3">Send Offer</h3>

<p id="proName" class="mb-2"></p>

<input id="offerInput" type="number" placeholder="Your Offer ($)"
class="w-full border px-3 py-2 rounded mb-3">

<button onclick="submitBooking()"
class="w-full bg-blue-600 text-white py-2 rounded font-bold">
Submit
</button>

<button onclick="closeBooking()"
class="w-full mt-2 text-gray-500">
Cancel
</button>
</div>
</div>

<!-- BOTTOM NAV -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 shadow-lg">
<button class="text-blue-600 flex flex-col items-center">
<i class="fas fa-home text-xl"></i>
<span class="text-xs">Home</span>
</button>

<button class="flex flex-col items-center">
<i class="fas fa-map text-xl"></i>
<span class="text-xs">Map</span>
</button>

<button class="flex flex-col items-center">
<i class="fas fa-briefcase text-xl"></i>
<span class="text-xs">Bookings</span>
</button>

<button class="flex flex-col items-center">
<i class="fas fa-user text-xl"></i>
<span class="text-xs">Profile</span>
</button>
</nav>

<script>
let userLat = null;
let userLng = null;
let map;

function getUserLocation() {
if (navigator.geolocation) {
navigator.geolocation.getCurrentPosition(
function(position) {
userLat = position.coords.latitude;
userLng = position.coords.longitude;
loadMap();
calculateAndShowDistance();
},
function() {
alert("Please enable GPS.");
}
);
}
}

function loadMap() {
map = L.map('map').setView([userLat, userLng], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '© OpenStreetMap'
}).addTo(map);

L.marker([userLat, userLng])
.addTo(map)
.bindPopup("You are here")
.openPopup();

const proLat = -17.8252;
const proLng = 31.0335;

L.marker([proLat, proLng])
.addTo(map)
.bindPopup("Tinashe M.");
}

function calculateDistance(lat1, lon1, lat2, lon2) {
const R = 6371;
const dLat = (lat2 - lat1) * Math.PI / 180;
const dLon = (lon2 - lon1) * Math.PI / 180;

const a =
Math.sin(dLat/2) * Math.sin(dLat/2) +
Math.cos(lat1 * Math.PI / 180) *
Math.cos(lat2 * Math.PI / 180) *
Math.sin(dLon/2) * Math.sin(dLon/2);

const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
return R * c;
}

function calculateAndShowDistance(){
const proLat = -17.8252;
const proLng = 31.0335;

const distance = calculateDistance(userLat,userLng,proLat,proLng);
document.getElementById("distance1").innerText =
distance.toFixed(1) + " km away";
}

let selectedPro = "";
function openBooking(name,price){
selectedPro = name;
document.getElementById("proName").innerText =
`${name} - Suggested $${price}`;
document.getElementById("bookingModal").classList.remove("hidden");
}

function closeBooking(){
document.getElementById("bookingModal").classList.add("hidden");
}

function submitBooking(){
const offer = document.getElementById("offerInput").value;
if(!offer){
alert("Enter offer.");
return;
}
alert("Offer sent to " + selectedPro);
closeBooking();
}
</script>

</body>
</html>
